log_format remna_access
    'remote_addr="$remote_addr" host="$host" method="$request_method" '
    'uri="$request_uri" status=$status bytes=$body_bytes_sent '
    'referer="$http_referer" user_agent="$http_user_agent" '
    'xff="$http_x_forwarded_for"';

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.log remna_access;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /runtime-config.js {
        default_type application/javascript;
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Never route hidden files or VCS metadata through the SPA fallback.
    location ~ /\.(?!well-known/) {
        return 404;
    }

    # Treat file-like requests as static resources and fail closed if missing.
    location ~* \.(?:avif|bmp|css|csv|eot|gif|ico|jpe?g|js|json|map|png|svg|txt|webmanifest|webp|woff2?|xml|ya?ml|toml|ini|cfg|conf|env|log|bak|old|save|backup|dist|sample|example|php|sql)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @spa;
    }

    # Only serve index.html for real browser navigations to client-side routes.
    location @spa {
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        if ($http_accept !~* "text/html") {
            return 404;
        }

        try_files /index.html =404;
    }
}
