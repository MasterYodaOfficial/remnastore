x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    ports:
      - "8000:8000"
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: ../../
      dockerfile: ops/docker/bot.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    ports:
      - "8080:8080"
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "-m", "app.tasks.payments_worker"]
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

  notifications-worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "-m", "app.tasks.notifications_worker"]
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

  broadcast-worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
    command: ["uv", "run", "--no-sync", "python", "-m", "app.tasks.broadcast_worker"]
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: ops/docker/web.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_TELEGRAM_BOT_URL: ${VITE_TELEGRAM_BOT_URL}
        VITE_SUPPORT_TELEGRAM_URL: ${VITE_SUPPORT_TELEGRAM_URL}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: ../../
      dockerfile: ops/docker/admin.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:80"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remnastore}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    restart: unless-stopped
    ports:
      - "5432:5432"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-remnastore}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
