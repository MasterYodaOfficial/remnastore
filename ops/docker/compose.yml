services:
  api:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy

  bot:
    build:
      context: ../../
      dockerfile: ops/docker/bot.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8080:8080"
    depends_on:
      - api

  worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    command: ["python", "-m", "app.tasks.payments_worker"]
    depends_on:
      - api

  notifications-worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    command: ["python", "-m", "app.tasks.notifications_worker"]
    depends_on:
      - api

  broadcast-worker:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    environment:
      TZ: Europe/Moscow
    command: ["python", "-m", "app.tasks.broadcast_worker"]
    depends_on:
      - api

  web:
    build:
      context: ../../
      dockerfile: ops/docker/web.Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ../../.env

  admin:
    build:
      context: ../../
      dockerfile: ops/docker/admin.Dockerfile
    ports:
      - "5174:5174"
    env_file:
      - ../../.env

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remnastore}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
