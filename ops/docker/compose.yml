services:
  api:
    build:
      context: ../../
      dockerfile: ops/docker/api.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  bot:
    build:
      context: ../../
      dockerfile: ops/docker/bot.Dockerfile
    env_file:
      - ../../.env
    environment:
      BOT_USE_WEBHOOK: "true"
      BOT_WEB_SERVER_HOST: "0.0.0.0"
      BOT_WEB_SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - api

  web:
    build:
      context: ../../
      dockerfile: ops/docker/web.Dockerfile
    ports:
      - "5173:5173"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: remnastore
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
