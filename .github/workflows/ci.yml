name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest
    env:
      # API tests replace sessions per suite, but imports still need a parseable URL in CI.
      DATABASE_URL: sqlite+aiosqlite:///./ci-python-quality.sqlite3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Run ruff check
        run: uv run --group dev ruff check apps/api apps/bot common scripts

      - name: Run ruff format check
        run: uv run --group dev ruff format --check apps/api apps/bot common scripts

      - name: Run Python tests
        run: ./scripts/test.sh all

  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run web lint
        run: npm run lint

      - name: Run web tests
        run: npm run test

      - name: Run web typecheck
        run: npm run typecheck

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web browser smoke
        run: npm run test:e2e

      - name: Upload web Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-playwright-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore

      - name: Build web
        run: npm run build

  admin-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Run admin lint
        run: npm run lint

      - name: Run admin tests
        run: npm run test

      - name: Run admin typecheck
        run: npm run typecheck

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run admin browser smoke
        run: npm run test:e2e

      - name: Upload admin Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-artifacts
          path: |
            apps/admin/test-results
            apps/admin/playwright-report
          if-no-files-found: ignore

      - name: Build admin
        run: npm run build
