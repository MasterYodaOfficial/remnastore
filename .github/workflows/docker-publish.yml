name: Docker Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docker-publish.yml
      - .dockerignore
      - alembic.ini
      - pyproject.toml
      - uv.lock
      - apps/**
      - common/**
      - packages/**
      - scripts/**
      - ops/docker/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-publish.yml
      - .dockerignore
      - alembic.ini
      - pyproject.toml
      - uv.lock
      - apps/**
      - common/**
      - packages/**
      - scripts/**
      - ops/docker/**
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_REPOSITORY: masteryodaofficial/remnastorepy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: ops/docker/api.Dockerfile
          - component: bot
            dockerfile: ops/docker/bot.Dockerfile
          - component: web
            dockerfile: ops/docker/web.Dockerfile
          - component: admin
            dockerfile: ops/docker/admin.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker tags
        id: tags
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "tags=${DOCKERHUB_REPOSITORY}:${COMPONENT}-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tags=${DOCKERHUB_REPOSITORY}:${COMPONENT}-latest,${DOCKERHUB_REPOSITORY}:${COMPONENT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
